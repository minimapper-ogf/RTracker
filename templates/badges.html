<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ badge_name }} - Badge Stats</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet" />
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/modules/exporting.js"></script>
  <style>
    body {
      font-family: 'Roboto Mono', monospace;
      background-color: #121212;
      color: #ddd;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px; /* spacing between main sections */
      min-height: 100vh;
      box-sizing: border-box;
    }

    header {
      text-align: center;
      margin-bottom: 10px;
      width: 100%;
      max-width: 800px;
    }

    header h1 {
      color: #eee;
      font-size: 2rem;
      margin-bottom: 0.2em;
    }

    .buttons {
      margin-bottom: 20px;
    }

    .buttons button {
      background-color: #222;
      color: #ddd;
      border: 1px solid #555;
      padding: 10px 20px;
      font-size: 1rem;
      margin: 0 5px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .buttons button:hover {
      background-color: #333;
    }

    /* Container holding badge metadata & charts side by side on larger screens */
    .content-container {
      display: flex;
      gap: 40px;
      width: 100%;
      max-width: 1200px;
      box-sizing: border-box;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Badge info box */
    .badge-container {
      background-color: #1c1c1c;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 20px;
      flex: 1 1 320px;
      max-width: 350px;
      box-sizing: border-box;
      user-select: text;
    }

    .badge-image {
      text-align: center;
      margin-bottom: 20px;
    }

    .badge-image img {
      max-width: 150px;
      height: auto;
      border-radius: 4px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .stat-label {
      color: #bbb;
      text-transform: uppercase;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .stat-value {
      font-weight: bold;
      color: #fff;
      font-size: 1.1rem;
    }

    .description {
      margin-top: 20px;
      line-height: 1.4;
      color: #ccc;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    /* Charts grid container */
    .charts-container {
      flex: 2 1 600px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      box-sizing: border-box;
      max-width: 850px;
      width: 100%;
    }

    .a {
    color: #4caf50;
    }

    .chart-container {
      background: #1c1c1c;
      border-radius: 6px;
      padding: 8px 12px;
      height: 450px;
      border: 1px solid #333;
      box-sizing: border-box;
      width: 100%;
      user-select: none;
    }

    /* Responsive tweaks */
    @media (max-width: 960px) {
      .content-container {
        flex-direction: column;
        align-items: center;
        width: 90vw;
      }

      .badge-container, .charts-container {
        max-width: 100%;
        flex: none;
        width: 100%;
      }

      .chart-container {
        height: 350px;
      }

      header h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>{{ badge_name }}</h1>
    <div class="buttons">
      <button onclick="window.location.href='../index.html'">Back to Home</button>
    </div>
  </header>

  <main class="content-container" aria-label="Badge information and statistics charts">
    <section class="badge-container" aria-label="Badge details">
      <div class="badge-image">
        <img src="{{ badge_icon }}" alt="{{ badge_name }} Badge Icon" />
      </div>

      <div class="stat"><div class="stat-label">Awarding Game</div><div class="stat-value"><a href="../{{ universe_id }}.html">{{ universe_name }}</a></div></div>
      <div class="stat"><div class="stat-label">Awarded Count</div><div class="stat-value">{{ awarded_count }}</div></div>
      <div class="stat"><div class="stat-label">Awarded Today</div><div class="stat-value">{{ awarded_today }}</div></div>
      <div class="stat"><div class="stat-label">Created</div><div class="stat-value">{{ created }}</div></div>
      <div class="stat"><div class="stat-label">Last Updated</div><div class="stat-value">{{ updated }}</div></div>

      {% if badge_description %}
      <div class="description">{{ badge_description }}</div>
      {% endif %}
    </section>

    <section class="charts-container" aria-label="Badge statistics trends charts">
      <div id="awarded-count-chart" class="chart-container"></div>
      <div id="awarded-today-chart" class="chart-container"></div>
      <div id="rarity-chart" class="chart-container"></div>
    </section>
  </main>

  <script>
    const awardedCountData = {{ awarded_count_data | safe }};
    const awardedTodayData = {{ awarded_today_data | safe }};
    const rarityData = {{ rarity_data | safe }};

    Highcharts.chart('awarded-count-chart', {
      chart: { type: 'line', backgroundColor: '#1c1c1c' },
      title: { text: 'Total Awarded Count Over Time', style: { color: '#eee' } },
      xAxis: { type: 'datetime', labels: { style: { color: '#ccc' } } },
      yAxis: { title: { text: 'Total', style: { color: '#ccc' } }, labels: { style: { color: '#ccc' } } },
      series: [{ name: 'Awarded Count', data: awardedCountData, color: '#00c853' }],
      credits: { enabled: false }
    });

    Highcharts.chart('awarded-today-chart', {
      chart: { type: 'line', backgroundColor: '#1c1c1c' },
      title: { text: 'Awarded Count Per Day', style: { color: '#eee' } },
      xAxis: { type: 'datetime', labels: { style: { color: '#ccc' } } },
      yAxis: { title: { text: 'Awarded Today', style: { color: '#ccc' } }, labels: { style: { color: '#ccc' } } },
      series: [{ name: 'Awarded Today', data: awardedTodayData, color: '#42a5f5' }],
      credits: { enabled: false }
    });

    Highcharts.chart('rarity-chart', {
      chart: { type: 'line', backgroundColor: '#1c1c1c' },
      title: { text: 'Rarity (Win Rate %) Over Time', style: { color: '#eee' } },
      xAxis: { type: 'datetime', labels: { style: { color: '#ccc' } } },
      yAxis: {
        title: { text: 'Win Rate %', style: { color: '#ccc' } },
        labels: { style: { color: '#ccc' } },
        min: 0,
        max: 1
      },
      series: [{
        name: 'Rarity %',
        data: rarityData,
        color: '#ff7043',
        tooltip: {
          valueDecimals: 2,
          valueSuffix: '%'
        }
      }],
      credits: { enabled: false }
    });
  </script>
</body>
</html>
