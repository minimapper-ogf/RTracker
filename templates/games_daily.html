<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minitracker {{ game_name }} Daily Stats</title>
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/modules/exporting.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Roboto Mono', monospace;
      background-color: #121212;
      color: #ddd;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 20px;
      min-height: 100vh;
      user-select: none;
    }

    header {
      width: 100%;
      max-width: 1600px;
      padding: 20px 0;
      border-bottom: 2px solid #333;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-weight: 700;
      font-size: 2rem;
      color: #eee;
    }

    .buttons {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 1200px;
      justify-content: center;
      margin-bottom: 12px;
    }

    button {
      background: #222;
      border: 1px solid #555;
      color: #ddd;
      padding: 10px 20px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 4px;
      transition: background-color 0.2s ease;
      user-select: none;
    }

    button:hover {
      background: #333;
      border-color: #888;
    }

    .info-live-container {
      display: flex;
      width: 70vw;
      max-width: 1200px;
      gap: 40px;
      box-sizing: border-box;
      justify-content: center;
      flex-wrap: wrap;
    }

    .daily-summary-box {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 6px;
      border: 1px solid #333;
      box-sizing: border-box;
      flex: 1 1 45%;
      min-width: 320px;
      user-select: text;
    }

    .daily-summary-box h2 {
      margin-top: 0;
      color: #eee;
      font-weight: 700;
      font-size: 1.6rem;
      border-bottom: 1px solid #333;
      padding-bottom: 6px;
      margin-bottom: 16px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .stat-label {
      font-weight: 600;
      font-size: 0.95rem;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .stat-value {
      font-weight: 700;
      font-size: 1.2rem;
      color: #eee;
      text-align: right;
      cursor: default;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
      width: 70vw;
      max-width: 1600px;
      box-sizing: border-box;
    }

    .chart-container {
      background: #1c1c1c;
      border-radius: 6px;
      padding: 8px 12px;
      height: 450px;
      border: 1px solid #333;
      box-sizing: border-box;
      width: 100%;
    }

    @media (max-width: 960px) {
      .info-live-container {
        flex-direction: column;
        width: 90vw;
      }

      .daily-summary-box {
        flex: none;
        width: 100%;
        min-width: unset;
      }

      .grid {
        grid-template-columns: 1fr;
        width: 90vw;
      }

      .chart-container {
        height: 360px;
      }

      header h1 {
        font-size: 1.7rem;
      }

      button {
        font-size: 0.9rem;
        padding: 8px 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>{{ game_name }} Daily</h1>
  </header>

  <div class="buttons">
    <button onclick="window.location.href='index.html';">Back to Home</button>
    <button onclick="goToNormal()">Normal</button>
    <button onclick="goToBadges()">View Badges</button>
  </div>

  <div class="info-live-container">
    <section class="daily-summary-box" aria-label="Daily Summary">
      <h2>Daily Summary</h2>

      <div class="stat">
        <div class="stat-label">Peak Players</div>
        <div class="stat-value">{{ "{:,}".format(daily_peak_players) }}</div>
      </div>

      <div class="stat">
        <div class="stat-label">Max Visits</div>
        <div class="stat-value">{{ "{:,}".format(daily_peak_visits) }}</div>
      </div>

      <div class="stat">
        <div class="stat-label">Max Favorites</div>
        <div class="stat-value">{{ "{:,}".format(daily_peak_favorites) }}</div>
      </div>

      <div class="stat">
        <div class="stat-label">Highest Upvote %</div>
        <div class="stat-value">{{ daily_peak_upvote_pct }}%</div>
      </div>
    </section>
  </div>

  <div class="grid">
    <div id="playing-chart" class="chart-container"></div>
    <div id="visits-chart" class="chart-container"></div>
    <div id="visitschange-chart" class="chart-container"></div>
    <div id="favorites-chart" class="chart-container"></div>
    <div id="favoritedchange-chart" class="chart-container"></div>
    <div id="upvotesdownvotes-chart" class="chart-container"></div>
    <div id="voteschange-chart" class="chart-container"></div>
    <div id="upvotespercentage-chart" class="chart-container"></div>
  </div>

  <script>
    function goToNormal() {
      const currentFilename = window.location.pathname.split('/').pop();
      const normalFilename = currentFilename.replace(/^daily_/, '');
      window.location.href = normalFilename;
    }

    function goToBadges() {
      const currentFilename = window.location.pathname.split('/').pop();  // "daily_123456.html"
      const baseName = currentFilename.replace('.html', '');              // "daily_123456"
      const universeId = baseName.split('_')[1];                          // "123456"
      const badgePath = `./${universeId}/index.html`;                     // "./123456/index.html"
      window.location.href = badgePath;
    }

    document.addEventListener("DOMContentLoaded", function () {
      const chartOptions = {
        chart: {
          type: 'line',
          zoomType: 'x',
          backgroundColor: '#121212',
          style: { fontFamily: "'Roboto Mono', monospace" },
        },
        title: { style: { color: '#ddd', fontWeight: '700' } },
        xAxis: {
          categories: {{ timestamps }},
          labels: { style: { color: '#ddd' } },
          lineColor: '#555',
          tickColor: '#555',
        },
        yAxis: {
          title: { style: { color: '#ddd', fontWeight: '600' } },
          labels: { style: { color: '#ddd' } },
          gridLineColor: '#333',
        },
        legend: { itemStyle: { color: '#bbb', fontWeight: '600' } },
        tooltip: {
          shared: true,
          crosshairs: true,
          backgroundColor: '#222',
          style: { color: '#ddd' },
          borderRadius: 4,
          borderWidth: 0
        },
        credits: { enabled: false },
        exporting: { enabled: true },
      };

      Highcharts.chart('playing-chart', {
        ...chartOptions,
        title: { text: 'Playing' },
        series: [{ name: 'Playing', data: {{ playing }} }],
        colors: ['#4caf50']
      });

      Highcharts.chart('visits-chart', {
        ...chartOptions,
        title: { text: 'Visits' },
        series: [{ name: 'Visits', data: {{ visits }} }],
        colors: ['#2196f3']
      });

      Highcharts.chart('visitschange-chart', {
        ...chartOptions,
        chart: { ...chartOptions.chart, type: 'column' },
        title: { text: 'Visits Change' },
        series: [{ name: 'Visits Change', data: {{ visitschange }} }],
        colors: ['#1976d2']
      });

      Highcharts.chart('favorites-chart', {
        ...chartOptions,
        title: { text: 'Favorites' },
        series: [{ name: 'Favorites', data: {{ favoritedCount }} }],
        colors: ['#4caf50']
      });

      Highcharts.chart('favoritedchange-chart', {
        ...chartOptions,
        chart: { ...chartOptions.chart, type: 'column' },
        title: { text: 'Favorites Change' },
        series: [{ name: 'Favorites Change', data: {{ favoritedchange }} }],
        colors: ['#388e3c']
      });

      Highcharts.chart('upvotesdownvotes-chart', {
        ...chartOptions,
        title: { text: 'Votes' },
        series: [
          { name: 'Upvotes', data: {{ upVotes }}, color: '#4caf50' },
          { name: 'Downvotes', data: {{ downVotes }}, color: '#d32f2f' }
        ]
      });

      Highcharts.chart('voteschange-chart', {
        ...chartOptions,
        chart: { ...chartOptions.chart, type: 'column' },
        title: { text: 'Votes Change' },
        series: [
          { name: 'Upvotes Change', data: {{ upVoteschange }}, color: '#81c784' },
          { name: 'Downvotes Change', data: {{ downVoteschange }}, color: '#e57373' }
        ]
      });

      Highcharts.chart('upvotespercentage-chart', {
        ...chartOptions,
        title: { text: 'Upvotes Percentage' },
        tooltip: { pointFormat: '{series.name}: <b>{point.y:.4f}%</b>' },
        series: [{ name: 'Upvotes %', data: {{ upVotespercentage }}, color: '#4caf50' }],
      });
    });
  </script>
</body>
</html>
