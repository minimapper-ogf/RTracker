<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ universe_name }} Badges</title>
  <style>
    body {
      margin: 0;
      font-family: 'Roboto Mono', monospace;
      background-color: #121212;
      color: #ddd;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 10px;
      color: #eee;
    }
    .button-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .button-bar a {
      background: #333;
      color: #ccc;
      padding: 10px 16px;
      border-radius: 4px;
      text-decoration: none;
      border: 1px solid #444;
      font-weight: bold;
    }
    .button-bar a:hover {
      background: #444;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }
    .badge-item {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .badge-item-link {
    text-decoration: none;
    color: inherit;
    }
    .badge-item-link:hover .badge-item {
    background-color: #2a2a2a;
    cursor: pointer;
    }

    .badge-item img {
      width: 100px;
      height: 100px;
      margin-bottom: 10px;
      border-radius: 8px;
    }
    .badge-item h2 {
      font-size: 1rem;
      margin: 0 0 10px;
      color: #fff;
    }
    .badge-item p {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 10px;
    }
    .stat {
      background: #222;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #ccc;
      margin: 2px 0;
    }
  </style>
</head>
<body>
  <h1>{{ universe_name }} - Badges</h1>
  <div class="button-bar">
    <a href="/index.html">Home</a>
    <a href="../{{ universe_id }}.html">Game Page</a>
  </div>

  <div class="container">
    {% for badge in badges %}
    <a href="./{{ badge.id }}.html" class="badge-item-link">
    <div class="badge-item">
        {% if badge.icon %}
        <img src="{{ badge.icon }}" alt="Badge icon for {{ badge.name }}">
        {% endif %}
        <h2>{{ badge.name }}</h2>
        <p>{{ badge.description }}</p>
        <div class="stat">🏆 Awarded: {{ "{:,}".format(badge.awarded_count) }}</div>
        <div class="stat">🎯 Win Rate: {{ "{:.2f}".format(badge.rarity) }}%</div>
        <div class="stat">📅 Created: {{ badge.created[:10] }}</div>
    </div>
    </a>
    {% endfor %}
  </div>
</body>
</html>
